<div class="auth-shell">
  <section class="auth-card">
    <div class="auth-header">
      <span class="auth-icon">🛒</span>
      <h1>Registro de cliente</h1>
      <p class="muted">El registro público crea una cuenta CUSTOMER para comprar en el tienda.</p>
    </div>

    @if (message) { <div class="alert success">{{ message }}</div> }
    @if (error) { <div class="alert error">{{ error }}</div> }

    <form [formGroup]="form" (ngSubmit)="submit()" class="form-grid">
      <label>
        Nombre
        <input formControlName="name" placeholder="Cliente Demo" />
      </label>

      <label>
        Username
        <input formControlName="username" placeholder="customer" autocomplete="username" />
      </label>

      <label>
        Contraseña
        <input formControlName="password" type="password" placeholder="123456" autocomplete="new-password" />
      </label>

      <button class="primary" [disabled]="form.invalid || loading">
        {{ loading ? 'Registrando...' : 'Registrarme' }}
      </button>

      <p class="muted small-link">
        ¿Ya tienes cuenta? <a routerLink="/login">Iniciar sesión</a>
      </p>
    </form>
  </section>
</div>
